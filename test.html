<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng nhập liệu</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 400px;
    }

    th,
    td {
      border: 1px solid #000;
      padding: 8px;
      text-align: center;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

  <table id="editableTable">
    <thead>
      <tr>
        <th>Cột 1</th>
        <th>Cột 2</th>
        <th>Cột 3</th>
        <th>Cột 4</th>
      </tr>
    </thead>
    <tbody>
      <!-- Tạo 5 hàng, mỗi hàng có 4 ô -->
      <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
      </tr>
      <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
      </tr>
      <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
      </tr>
      <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
      </tr>
      <tr>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
      </tr>
    </tbody>
  </table>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const inputs = document.querySelectorAll("#editableTable input")

      // Thêm sự kiện lắng nghe cho mỗi ô input
      inputs.forEach((input, index) => {
        input.addEventListener("keydown", (event) => {
          const rowLength = 4 // số ô trong một hàng (số cột)
          const totalCells = inputs.length

          let newIndex
          switch (event.key) {
            case "ArrowUp":
              newIndex = index - rowLength
              break
            case "ArrowDown":
              newIndex = index + rowLength
              break
            case "ArrowLeft":
              newIndex = index - 1
              break
            case "ArrowRight":
              newIndex = index + 1
              break
            default:
              return // thoát nếu không phải các phím điều hướng
          }

          // Kiểm tra nếu chỉ số hợp lệ, chuyển đến ô mới
          if (newIndex >= 0 && newIndex < totalCells) {
            inputs[newIndex].focus()
          }

          event.preventDefault() // ngăn chặn hành vi mặc định
        })
      })
    });

  </script>
</body>

</html>
